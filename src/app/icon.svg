<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="qg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a12"/>
  <!-- Orbital rings -->
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="url(#qg)" stroke-width="1.2" opacity="0.7" transform="rotate(-30 16 16)"/>
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="url(#qg)" stroke-width="1.2" opacity="0.7" transform="rotate(30 16 16)"/>
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="url(#qg)" stroke-width="1.2" opacity="0.5" transform="rotate(90 16 16)"/>
  <!-- Nucleus / key-lock dot -->
  <circle cx="16" cy="16" r="3.5" fill="url(#qg)"/>
  <circle cx="16" cy="16" r="1.5" fill="#0a0a12"/>
  <!-- Electron dots -->
  <circle cx="6" cy="10" r="1.2" fill="#06b6d4" opacity="0.9"/>
  <circle cx="26" cy="22" r="1.2" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="16" cy="4.5" r="1.2" fill="#06b6d4" opacity="0.7"/>
</svg>
